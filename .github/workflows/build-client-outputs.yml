name: build-client-outputs

on:
  workflow_dispatch:
  push:
    paths:
      - "android/**"
      - "mac/**"
      - ".github/workflows/build-client-outputs.yml"

permissions:
  contents: write

concurrency:
  group: build-client-outputs-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.filter.outputs.android }}
      mac: ${{ steps.filter.outputs.mac }}
      app_version: ${{ steps.version.outputs.app_version }}
      version_code: ${{ steps.version.outputs.version_code }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed targets
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            android:
              - 'android/**'
            mac:
              - 'mac/**'

      - name: Bump shared app version
        id: version
        run: |
          CURRENT_VERSION=$(grep 'versionName = "' android/app/build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')
          CURRENT_VERSION_CODE=$(grep 'versionCode = ' android/app/build.gradle.kts | sed -E 's/.*versionCode = ([0-9]+).*/\1/')

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          NEXT_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          NEXT_VERSION_CODE=$((CURRENT_VERSION_CODE + 1))

          echo "app_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$NEXT_VERSION_CODE" >> "$GITHUB_OUTPUT"

  build-android:
    needs: changes
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Prepare local properties
        run: printf 'sdk.dir=%s\n' "$ANDROID_SDK_ROOT" > android/local.properties

      - name: Apply bumped Android version
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          path = Path("android/app/build.gradle.kts")
          text = path.read_text()
          text = re.sub(r'versionCode = \d+', 'versionCode = ${{ needs.changes.outputs.version_code }}', text, count=1)
          text = re.sub(r'versionName = "[^"]+"', 'versionName = "${{ needs.changes.outputs.app_version }}"', text, count=1)
          path.write_text(text)
          PY

      - name: Build installable APK
        run: ./gradlew assembleDebug
        working-directory: /home/runner/work/air-bridge/air-bridge/android

      - name: Prepare Android output
        run: |
          mkdir -p outputs/android
          cp android/app/build/outputs/apk/debug/app-debug.apk "outputs/android/air-bridge_v${{ needs.changes.outputs.app_version }}.apk"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-output
          path: outputs/android/air-bridge_v${{ needs.changes.outputs.app_version }}.apk

  build-mac:
    needs: changes
    if: needs.changes.outputs.mac == 'true'
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Build release binary
        run: swift build --package-path mac -c release --product AirBridgeMac

      - name: Bundle macOS app
        run: |
          APP="dist/AirBridgeMac.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"

          cp "mac/.build/release/AirBridgeMac" "$APP/Contents/MacOS/AirBridgeMac"
          chmod +x "$APP/Contents/MacOS/AirBridgeMac"

          cat > "$APP/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>AirBridgeMac</string>
            <key>CFBundleIdentifier</key>
            <string>com.airbridge.mac</string>
            <key>CFBundleName</key>
            <string>AirBridgeMac</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ needs.changes.outputs.app_version }}</string>
            <key>CFBundleVersion</key>
            <string>${{ needs.changes.outputs.version_code }}</string>
            <key>LSMinimumSystemVersion</key>
            <string>14.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>NSAppTransportSecurity</key>
            <dict>
                <key>NSAllowsArbitraryLoads</key>
                <true/>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Ad-hoc sign app
        run: codesign --force --deep --sign - "dist/AirBridgeMac.app"

      - name: Verify app signature
        run: codesign --verify --deep --strict --verbose=2 "dist/AirBridgeMac.app"

      - name: Create DMG
        run: |
          mkdir -p outputs/mac
          DMG_NAME="air-bridge_v${{ needs.changes.outputs.app_version }}.dmg"
          hdiutil create -volname "AirBridge" -srcfolder "dist" -ov -format UDZO "outputs/mac/$DMG_NAME"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-output
          path: outputs/mac/air-bridge_v${{ needs.changes.outputs.app_version }}.dmg

  publish-outputs:
    needs: [changes, build-android, build-mac]
    if: always() && (needs.changes.outputs.android == 'true' || needs.changes.outputs.mac == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any requested build failed
        run: |
          if [ "${{ needs.build-android.result }}" = "failure" ] || [ "${{ needs.build-mac.result }}" = "failure" ]; then
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Android output
        if: needs.changes.outputs.android == 'true'
        uses: actions/download-artifact@v4
        with:
          name: android-output
          path: outputs/android

      - name: Download macOS output
        if: needs.changes.outputs.mac == 'true'
        uses: actions/download-artifact@v4
        with:
          name: mac-output
          path: outputs/mac

      - name: Persist bumped shared app version
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          path = Path("android/app/build.gradle.kts")
          text = path.read_text()
          text = re.sub(r'versionCode = \d+', 'versionCode = ${{ needs.changes.outputs.version_code }}', text, count=1)
          text = re.sub(r'versionName = "[^"]+"', 'versionName = "${{ needs.changes.outputs.app_version }}"', text, count=1)
          path.write_text(text)
          PY

      - name: Commit generated outputs
        run: |
          if [ -z "$(git status --porcelain -- outputs android/app/build.gradle.kts)" ]; then
            echo "No output changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs android/app/build.gradle.kts
          git commit -m "build: bump app version to v${{ needs.changes.outputs.app_version }} [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}
