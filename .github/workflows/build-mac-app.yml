name: build-mac-app

on:
  workflow_dispatch:
  push:
    paths:
      - "mac/**"
      - ".github/workflows/build-mac-app.yml"
      - "!mac/outputs/**"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Build release binary
        run: swift build --package-path mac -c release --product AirBridgeMac

      - name: Bundle macOS app
        run: |
          APP="dist/AirBridgeMac.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"

          cp "mac/.build/release/AirBridgeMac" "$APP/Contents/MacOS/AirBridgeMac"
          chmod +x "$APP/Contents/MacOS/AirBridgeMac"

          cat > "$APP/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>AirBridgeMac</string>
            <key>CFBundleIdentifier</key>
            <string>com.airbridge.mac</string>
            <key>CFBundleName</key>
            <string>AirBridgeMac</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>0.1.0</string>
            <key>CFBundleVersion</key>
            <string>${GITHUB_RUN_NUMBER}</string>
            <key>LSMinimumSystemVersion</key>
            <string>14.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Ad-hoc sign app
        run: codesign --force --deep --sign - "dist/AirBridgeMac.app"

      - name: Verify app signature
        run: codesign --verify --deep --strict --verbose=2 "dist/AirBridgeMac.app"

      - name: Package app into repository outputs
        run: |
          mkdir -p mac/outputs
          ditto -c -k --sequesterRsrc --keepParent "dist/AirBridgeMac.app" "mac/outputs/AirBridgeMac-macos.zip"

      - name: Upload downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: AirBridgeMac-macos
          path: mac/outputs/AirBridgeMac-macos.zip

      - name: Commit output archive
        run: |
          if [ -z "$(git status --porcelain -- mac/outputs/AirBridgeMac-macos.zip)" ]; then
            echo "No output changes to commit"
            exit 0
          fi

          git add mac/outputs/AirBridgeMac-macos.zip
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "build: update macOS output archive [skip ci]"
          git push
